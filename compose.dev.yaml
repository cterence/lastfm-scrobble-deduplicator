name: dev
services:
  app:
    container_name: app-dev
    build:
      target: development
      context: .
    environment:
      REDIS_URL: redis://redis:6379/0
      BROWSER_URL: ws://chromium-dev:3000?token=local
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      chromium:
        condition: service_healthy

  redis:
    container_name: redis-dev
    image: redis:latest@sha256:25dbb04fc4d6d190eda327dab551631500b0f9ac8f9808e8e63b7fda1ddff196
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

  chromium:
    container_name: chromium-dev
    image: ghcr.io/browserless/chromium:latest@sha256:5fc8077ceb90499f920f0896a2f50a1cb95305fa128b7099821e11f0a35fac2c
    ports:
      - 3000:3000
    environment:
      TOKEN: local
      TIMEOUT: 600000
      HOST: chromium-dev
      DEBUG: -*
    healthcheck:
      test: ["CMD", "curl", "http://chromium-dev:3000/active?token=local"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
