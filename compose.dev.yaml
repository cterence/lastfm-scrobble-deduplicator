name: dev
services:
  app:
    container_name: app-dev
    build:
      target: development
      context: .
    environment:
      REDIS_URL: redis://redis:6379/0
      BROWSER_URL: ws://chromium-dev:3000?token=local
    volumes:
      - ./:/app
    depends_on:
      redis:
        condition: service_healthy
      chromium:
        condition: service_healthy

  redis:
    container_name: redis-dev
    image: redis:latest@sha256:832d7785830f3f4b559300e6191fc914b15642c1935252338825cf4332200148
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis-data:/data

  chromium:
    container_name: chromium-dev
    image: ghcr.io/browserless/chromium:latest@sha256:813077a39aa815e165503fb38edf917408dd885b9b3a1d8bc4f2e013bcfd38a7
    ports:
      - 3000:3000
    environment:
      TOKEN: local
      TIMEOUT: 600000
      HOST: chromium-dev
      DEBUG: -*
    healthcheck:
      test: ["CMD", "curl", "http://chromium-dev:3000/active?token=local"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
